   hover_underline: "nether/warped wart block, shroomlight",
   hover: "also potted crimson fungus, warped fungus by option"}

- {key: option_mushroom, default: 1, short: mushroom, label: "Mushroom",
   on_text: "You can use bone meal on ", off_text: "You cannot use bone meal on ",
