# BotaniClone option-definitions table.
# The options_table plugin reads this and generates:
#   - botaniclone:options/default       (defaults applied at load, only if unset)
#   - botaniclone:options/toggle/<key>  (one toggle function per option)
#   - botaniclone:settings              (chat menu)
#
# Schema:
#   key            - scoreboard objective name (under guris.botani)
#   default        - 0 or 1
#   short          - clickable command path segment (last leg under .../toggle/)
#   label          - bold label in chat menu
#   on_text/off_text  - tail text shown after the label depending on state
#   hover_underline   - portion of on/off text that's underlined (for hover tooltip)
#   hover          - hover tooltip body (shown on the underlined portion)
#   min_pack_format - hide row from the menu when target < this (e.g. 26.1+ blocks)

# === Replication of certain plants ===
- {key: option_ancient,    default: 0, short: ancient_plants, label: "Ancient plants",
   on_text: "You can use bone meal on ", off_text: "You cannot use bone meal on ",
   hover_underline: "ancient plants",
   hover: "torchflower, pitcher plant, and pitcher crops"}

- {key: option_netherwart, default: 0, short: nether_wart, label: "Nether wart",
   on_text: "You can use bone meal on nether wart", off_text: "You cannot use bone meal on nether wart"}

- {key: option_witherrose, default: 0, short: wither_rose, label: "Wither rose",
   on_text: "You can use bone meal on wither rose", off_text: "You cannot use bone meal on wither rose"}

- {key: option_golden_dandelion, default: 0, short: golden_dandelion, label: "Golden dandelion",
   on_text: "You can use bone meal on ", off_text: "You cannot use bone meal on ",
   hover_underline: "golden dandelion",
   hover: "added in 26.1; craft-only and not naturally generating, so default off",
   min_pack_format: 100}

