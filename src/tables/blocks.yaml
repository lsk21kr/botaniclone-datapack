# BotaniClone block-definitions table.
# One row per trigger block. The block_table plugin reads this and generates
# the dispatcher (botaniclone:plant_check) plus per-behavior handler macros.
#
# Schema:
#   id              - minecraft:<id> trigger block (required)
#   behavior        - one of: spawn_loot, spawn_loot_alt, spawn_loot_mode_tall,
#                     spawn_loot_mode_eye, spawn_loot_potted_only, spawn_pitcher,
#                     chorus_deage (required)
#   loot            - primary loot table id
#   loot_alt        - alt loot for spawn_loot_alt (used when option_modeloot=0)
#   loot_tall/short - tall-mode pair (spawn_loot_mode_tall)
#   loot_day/night  - eyeblossom time-based pair (spawn_loot_mode_eye)
#   potted_id       - potted variant block id; empty = no potted check
#   blockstate      - state suffix string e.g. "[age=4]"; concatenated to id
#   option_score    - scoreboard objective name to gate on (== 1)
#   above           - second-pass offset string e.g. "~ ~1 ~" or "~ ~-1 ~";
#                     omitted = block only checked at ground level
#   potted_only     - true => no ground-block-equality unless-guard in pass 2
#   min_pack_format - row dropped when target_pack_format < this value
#
# Step 5 will append new-block rows (1.21.4+, 26.1).

